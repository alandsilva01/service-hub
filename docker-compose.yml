services:
  app:
    build: .
    container_name: service_hub_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - service_hub

  nginx:
    image: nginx:alpine
    container_name: service_hub_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - service_hub

  db:
    image: mysql:8.0
    container_name: service_hub_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: service_hub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - service_hub

networks:
  service_hub:
    driver: bridge

volumes:
  dbdata:
